name: Build and Deploy DocFX Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Build Developer Docs
        run: dotnet tool run docfx developer/docfx.json

      - name: Build User Docs
        run: dotnet tool run docfx user/docfx.json

      - name: Create root landing page
        run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>K+B Office Add-ins Documentation</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: #f5f5f5; }
              header { background: #0078d4; color: #fff; padding: 2rem; text-align: center; }
              header h1 { margin: 0; font-size: 2rem; }
              main { max-width: 800px; margin: 3rem auto; padding: 0 1rem; display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }
              a.card { display: block; background: #fff; border-radius: 8px; padding: 2rem; text-decoration: none; color: inherit; box-shadow: 0 2px 8px rgba(0,0,0,.1); flex: 1 1 300px; transition: box-shadow .2s; }
              a.card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.2); }
              a.card h2 { margin-top: 0; color: #0078d4; }
              a.card p { color: #555; margin: 0; }
            </style>
          </head>
          <body>
            <header><h1>K+B Office Add-ins Documentation</h1></header>
            <main>
              <a class="card" href="user/">
                <h2>User Documentation</h2>
                <p>Features, configuration, and licensing guides for end users.</p>
              </a>
              <a class="card" href="developer/">
                <h2>Developer Documentation</h2>
                <p>Architecture, APIs, patterns, and developer guides.</p>
              </a>
            </main>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
